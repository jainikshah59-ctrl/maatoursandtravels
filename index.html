<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maa Tour & Travels — Bhuj, Gujarat</title>
    <meta name="description" content="Maa Tour & Travels — Premium cab, taxi, and tour packages from Bhuj, Gujarat. Saurashtra, Kutch, Goa, Himachal, Rajasthan and more." />

    <!-- DNS prefetch for external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://wa.me" />

    <!-- Preload splash video (MP4 — browser will use WebM if it picks up the <source> tag faster) -->
    <link rel="preload" href="/videos/splash.mp4" as="video" type="video/mp4" />

    <!-- Preload logo — shown immediately during splash -->
    <link rel="preload" href="/images/logo.webp" as="image" />

    <!-- Prefetch destination images so they're ready before user scrolls -->
    <link rel="prefetch" href="/images/saurashtra.webp" as="image" />
    <link rel="prefetch" href="/images/kutch.webp" as="image" />
    <link rel="prefetch" href="/images/goa.webp" as="image" />
    <link rel="prefetch" href="/images/himachal.webp" as="image" />
    <link rel="prefetch" href="/images/rajasthan.webp" as="image" />
    <link rel="prefetch" href="/images/gujarat.webp" as="image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
